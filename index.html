<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamAI - Generate Exam Papers in Seconds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .exam-paper { 
            background: white; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            max-width: 210mm; 
            max-height: 90vh;
            overflow-y: auto;
            margin: 0 auto;
        }
        @media print {
            .no-print, #examPaper { display: none !important; }
            .exam-paper { box-shadow: none; margin: 0; max-height: none; }
        }
        .gradient-bg { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
        #examPaper { overflow-y: auto; }
        .question-item { break-inside: avoid; }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">

<!-- [KEEP ALL HTML SAME AS BEFORE - ONLY JAVASCRIPT CHANGES BELOW] -->

<script>
    // BETTER QUESTIONS BY SUBJECT & GRADE
    const questionBank = {
        Mathematics: {
            '1-5': ['2+2=?', 'Count to 10', 'Big/Small', 'Colors', 'Shapes'],
            '6-8': ['10+15=?', '25-10=?', 'Even/Odd', 'Fractions intro', 'Time telling'],
            '9-10': ['Algebra basics', 'Geometry shapes', 'Percentage', 'Ratio', 'Simple equations'],
            '11-12': ['Quadratic equations', 'Trigonometry', 'Calculus intro', 'Vectors', 'Matrices']
        },
        Science: {
            '1-5': ['Parts of plant', 'Animal sounds', 'Weather', 'Human body', 'Food groups'],
            '6-8': ['Photosynthesis', 'Solar system', 'Motion laws', 'Chemical reactions', 'Ecosystem'],
            '9-10': ['Periodic table', 'Genetics', 'Electricity', 'Acids/Bases', 'Human physiology'],
            '11-12': ['Organic chemistry', 'Thermodynamics', 'Biotechnology', 'Nuclear physics']
        },
        English: {
            '1-5': ['ABC order', 'Rhyming words', 'Simple sentences', 'Opposites', 'My family'],
            '6-8': ['Tenses', 'Comprehension', 'Synonyms', 'Essay writing', 'Poem explanation'],
            '9-10': ['Literature analysis', 'Grammar complex', 'Precis writing', 'Debate topics'],
            '11-12': ['Shakespeare', 'Modern poetry', 'Literary criticism', 'Research paper']
        }
    };

    function generateExam() {
        const subject = document.getElementById('subject').value || 'Mathematics';
        const grade = document.getElementById('grade').value || '10';
        const topic = document.getElementById('topic').value || 'General';
        const numQuestions = parseInt(document.getElementById('numQuestions').value);
        const difficulty = document.getElementById('difficulty').value;
        const questionType = document.getElementById('questionType').value;

        document.querySelector('#generateText').textContent = 'Generating...';
        
        setTimeout(() => {
            const questions = generateSmartQuestions(subject, grade, numQuestions, questionType, difficulty);
            displayExamPaper(subject, grade, topic, questions);
            document.querySelector('#generateText').textContent = 'Generate Exam Paper';
        }, 1500);
    }

    function generateSmartQuestions(subject, grade, count, type, difficulty) {
        const gradeGroup = grade.includes('1-5') ? '1-5' : grade.includes('6-8') ? '6-8' : '9-12';
        const templates = questionBank[subject]?.[gradeGroup] || questionBank.Mathematics['9-10'];
        
        const questions = [];
        for(let i = 1; i <= count; i++) {
            const baseQ = templates[Math.floor(Math.random() * templates.length)];
            const marks = type === 'MCQ' ? 2 : type === 'Short Answer' ? 4 : 8;
            
            questions.push({
                number: i,
                text: `${baseQ} (${difficulty} level)`,
                type: type,
                marks: marks,
                options: type === 'MCQ' ? ['A) Option 1', 'B) Option 2', 'C) Option 3', 'D) Option 4'] : null
            });
        }
        return questions;
    }

    // FIXED SMOOTH SCROLLING
    document.addEventListener('DOMContentLoaded', function() {
        // Navbar links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // Demo button
        document.querySelectorAll('[href="#demo"]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                alert('Demo: Fill form → Generate → Print! Works perfectly! 🎉');
            });
        });

        // Pro button
        document.querySelectorAll('.get-pro').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                window.open('https://razorpay.com', '_blank');
            });
        });
    });

    function displayExamPaper(subject, grade, topic, questions) {
        const totalMarks = questions.reduce((sum, q) => sum + q.marks, 0);
        document.getElementById('generatedExamContent').innerHTML = `
            <div class="p-8 md:p-12">
                <div class="text-center border-b-4 border-blue-600 pb-8 mb-12">
                    <div class="flex items-center justify-center mb-6">
                        <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mr-6">
                            <i class="fas fa-school text-3xl text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-3xl md:text-4xl font-bold text-gray-900">ABC INTERNATIONAL SCHOOL</h1>
                            <p class="text-lg md:text-xl text-gray-600 mt-1">Class: ${grade} | Subject: ${subject}</p>
                        </div>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">Topic: ${topic}</h2>
                    <p class="text-lg text-gray-600">Time: 3 Hours &nbsp;&nbsp; Max Marks: ${totalMarks}</p>
                </div>

                <div class="bg-blue-50 border-l-8 border-blue-500 p-6 md:p-8 rounded-xl mb-12">
                    <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-4">📋 Instructions:</h3>
                    <ul class="space-y-2 text-base md:text-lg list-disc ml-6">
                        <li>Attempt all questions</li>
                        <li>Show working steps</li>
                        <li>Draw neat diagrams</li>
                        <li>Write legibly</li>
                    </ul>
                </div>

                <div class="space-y-6 md:space-y-8">
                    ${questions.map(q => `
                        <div class="question-item bg-white p-6 md:p-8 rounded-2xl border-l-4 border-${q.type === 'MCQ' ? 'green' : q.type === 'Short Answer' ? 'blue' : 'purple'}-500 shadow-sm">
                            <div class="flex flex-col md:flex-row justify-between items-start mb-6">
                                <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-2 md:mb-0">Q${q.number}. ${q.text}</h3>
                                <span class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold text-lg">[${q.marks} Marks]</span>
                            </div>
                            
                            ${q.options ? `
                                <div class="grid md:grid-cols-2 gap-4 ml-0 md:ml-6">
                                    ${q.options.map((opt, idx) => `
                                        <label class="flex items-center p-4 bg-gray-50 border-2 border-gray-200 rounded-xl hover:border-green-400 hover:bg-green-50 transition-all cursor-pointer">
                                            <input type="radio" name="q${q.number}" class="mr-4 text-green-600 w-5 h-5">
                                            <span class="font-semibold">${opt}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            ` : `
                                <div class="bg-gradient-to-r from-gray-50 to-gray-100 p-8 rounded-xl border-2 border-dashed border-gray-300 min-h-[100px] mt-4">
                                    <p class="text-gray-500 italic text-center pt-12">👋 Write your detailed answer here...</p>
                                </div>
                            `}
                        </div>
                    `).join('')}
                </div>

                <div class="mt-16 pt-12 border-t-4 border-gray-300 text-center">
                    <p class="text-2xl font-bold text-gray-700 mb-4">✨ Best of Luck! ✨</p>
                    <p class="text-xl text-gray-600">ABC International School | Generated by ExamAI</p>
                </div>
            </div>
        `;
        
        document.getElementById('examPaper').scrollTop = 0;
        document.getElementById('examPaper').classList.remove('hidden');
    }

    // [KEEP ALL OTHER FUNCTIONS SAME - closeExam, printExam, downloadExam]
    function closeExam() {
        document.getElementById('examPaper').classList.add('hidden');
    }

    function printExam() {
        window.print();
    }

    function downloadExam() {
        const content = document.getElementById('generatedExamContent').innerHTML;
        const win = window.open('', '_blank');
        win.document.write(`
            <html><head><title>Exam Paper - ExamAI</title>
            <style>body{font-family:'Inter',sans-serif;margin:40px}@media print{body{padding:0}}</style></head>
            <body>${content}</body></html>`);
        win.document.close();
        win.print();
    }
</script>

</body>
</html>
